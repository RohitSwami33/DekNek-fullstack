<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deknek - Full Stack App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 400px; max-width: 90vw; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { color: #667eea; font-size: 2.5rem; margin-bottom: 0.5rem; }
    .logo p { color: #666; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; }
    .form-group input { width: 100%; padding: 0.8rem 1rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
    .form-group input:focus { outline: none; border-color: #667eea; }
    .btn { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .toggle { text-align: center; margin-top: 1.5rem; color: #666; }
    .toggle a { color: #667eea; text-decoration: none; font-weight: 600; cursor: pointer; }
    .error { background: #fee; color: #c00; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #fcc; }
    .success { background: #efe; color: #060; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #cfc; }
    .dashboard { display: none; text-align: center; }
    .dashboard h2 { color: #333; margin-bottom: 1rem; }
    .dashboard .user-info { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
    .dashboard .user-info h3 { margin-bottom: 0.5rem; }
    .dashboard .user-info p { opacity: 0.9; font-size: 0.9rem; }
    .logout-btn { background: #dc3545; margin-top: 1rem; }
    .logout-btn:hover { background: #c82333; box-shadow: 0 8px 25px rgba(220, 53, 69, 0.4); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Deknek</h1>
      <p>Full Stack Auth App</p>
    </div>

    <div id="authSection">
      <div id="messageBox"></div>

      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <button class="btn" onclick="login()">Login</button>
        <div class="toggle">
          Don't have an account? <a onclick="showSignup()">Sign up</a>
        </div>
      </div>

      <div id="signupForm" class="hidden">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Choose a password" required>
        </div>
        <button class="btn" onclick="signup()">Sign Up</button>
        <div class="toggle">
          Already have an account? <a onclick="showLogin()">Login</a>
        </div>
      </div>
    </div>

    <div id="dashboard" class="dashboard">
      <h2>Welcome!</h2>
      <div class="user-info">
        <h3 id="dashUsername"></h3>
        <p id="dashEmail"></p>
        <p id="dashJoined"></p>
      </div>
      <button class="btn logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    function showMessage(text, type = 'error') {
      const box = document.getElementById('messageBox');
      box.innerHTML = `<div class="${type}">${text}</div>`;
      setTimeout(() => box.innerHTML = '', 3000);
    }

    function showSignup() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('signupForm').classList.remove('hidden');
      document.getElementById('messageBox').innerHTML = '';
    }

    function showLogin() {
      document.getElementById('signupForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('messageBox').innerHTML = '';
    }

    async function signup() {
      const username = document.getElementById('signupUsername').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;

      if (!username || !email || !password) {
        showMessage('All fields are required');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('Please enter a valid email address');
        return;
      }

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters');
        return;
      }

      if (username.length < 3) {
        showMessage('Username must be at least 3 characters');
        return;
      }

      try {
        const res = await fetch(API_URL + '/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          showMessage(data.message, 'success');
          setTimeout(showLogin, 1000);
        } else {
          showMessage(data.message);
        }
      } catch (err) {
        showMessage('Connection error');
      }
    }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showMessage('All fields are required');
        return;
      }

      try {
        const res = await fetch(API_URL + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          showDashboard();
        } else {
          showMessage(data.message);
        }
      } catch (err) {
        showMessage('Connection error');
      }
    }

    async function showDashboard() {
      const token = localStorage.getItem('token');
      if (!token) {
        showLoginForm();
        return;
      }

      try {
        const res = await fetch(API_URL + '/api/user', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const user = await res.json();
          document.getElementById('authSection').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          document.getElementById('dashUsername').textContent = user.username;
          document.getElementById('dashEmail').textContent = user.email;
          document.getElementById('dashJoined').textContent = `Joined: ${new Date(user.createdAt).toLocaleDateString()}`;
        } else {
          logout();
        }
      } catch (err) {
        logout();
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      showLogin();
    }

    if (localStorage.getItem('token')) {
      showDashboard();
    }
  </script>
</body>
</html>
